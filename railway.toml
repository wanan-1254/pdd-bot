[build]
builder = "NIXPACKS"

[deploy]
startCommand = "playwright install chromium --with-deps && python main.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/"
timeout = 600
